function getRadius(v) {
  if (v>400) return 22;
  if (v>150) return 16;
  if (v>80)  return 12;
  if (v>40)  return 9;
  if (v>15)  return 7;
  return 5;
}

    radius: getRadius(f.volume),
    fillColor: color, color:'white',
    weight:1.5, opacity:1, fillOpacity:0.85
  }).addTo(map);

    <div class="popup-name">${f.name}</div>
    <div class="popup-code">CODE: ${f.code}</div>
    <div class="popup-addr">📍 ${f.address || f.port}</div>

});

});
